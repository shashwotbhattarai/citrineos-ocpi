name: Yatri Energy OCPI CI/CD

on:
  push:
    branches:
      - cicd
  workflow_dispatch:

env:
  OCPI_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/yatri-energy-ocpi

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-ocpi-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-ocpi-

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push OCPI image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Server/deploy.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.OCPI_IMAGE }}:cicd
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Move cache to avoid ever-growing cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Summary
        run: |
          echo "## Docker Image Pushed Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OCPI Image:** \`${{ env.OCPI_IMAGE }}:cicd\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Watchtower will automatically pull and deploy this image on EC2." >> $GITHUB_STEP_SUMMARY
